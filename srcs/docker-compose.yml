services:
  nginx:
    build: ./nginx
    restart: on-failure
    ports:
      - "443:443"
    environment:
      HOST_NAME: ${HOST_NAME}
      PORT: ${PORT}
    networks:
      - inception_network
    volumes:
      - wordpress_data:/var/www/html:ro
    depends_on:
      - wordpress

  wordpress:
    build: ./wordpress
    restart: on-failure
    networks:
      - inception_network
    environment:
      WORDPRESS_DB_HOST: ${WORDPRESS_DB_HOST}
      WORDPRESS_DB_PORT: ${WORDPRESS_DB_PORT}
      WORDPRESS_DB_USER: ${WORDPRESS_DB_USER}
      WORDPRESS_DB_PASSWORD_FILE: /run/secrets/db_password
      WORDPRESS_DB_NAME: ${WORDPRESS_DB_NAME}
      WORDPRESS_DB_URL: ${WORDPRESS_DB_URL}
      WORDPRESS_ADMIN_USER: ${WORDPRESS_ADMIN}
      WORDPRESS_ADMIN_PASSWORD_FILE: /run/secrets/db_admin_password
      WORDPRESS_ADMIN_EMAIL: ${WORDPRESS_ADMIN_EMAIL}
      WORDPRESS_USER: ${WORDPRESS_USER}
      WORDPRESS_USER_EMAIL: ${WORDPRESS_USER_EMAIL}
      WORDPRESS_USER_PASSWORD_FILE: /run/secrets/db_user_password
    volumes:
      - wordpress_data:/var/www/html
    secrets:
      - db_password
      - db_admin_password
      - db_user_password
    depends_on:
      - mariadb

  mariadb:
    build: ./mariadb
    restart: on-failure
    networks:
      - inception_network
    secrets:
      - db_root_password
      - db_password
    environment:
      MYSQL_ROOT_PASSWORD_FILE: /run/secrets/db_root_password
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD_FILE: /run/secrets/db_password
    volumes:
      - db_data:/var/lib/mysql

networks:
  inception_network:
    driver: bridge

volumes:
  wordpress_data:
    name: wordpress_data
    driver: local
    driver_opts:
      type: none
      device: ${VOLUME_PATH}/${WP_VOLUME}
      o: bind
  db_data:
    name: db_data
    driver: local
    driver_opts:
      type: none
      device: ${VOLUME_PATH}/${DB_VOLUME}
      o: bind

secrets:
  db_user_password:
    file: ../secrets/db_user_password.txt
  db_root_password:
    file: ../secrets/db_root_password.txt
  db_password:
    file: ../secrets/db_password.txt
  db_admin_password:
    file: ../secrets/db_admin_password.txt
